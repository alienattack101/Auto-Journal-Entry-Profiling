<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JE Automation Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Journal Entry Exception Report Generator</h1>
        <p style="text-align: center;">Upload your Journal Entry (JE) dataset (CSV format) to scan for anomalies and compliance issues.</p>
        
        {% with messages = get_flashed_messages()%}
          {% if messages %}
          <div class="flash-messages">
            {% for message in messages %}
            <p>{{ message }}</p>
            {% endfor %}   
          </div>   
          {% endif %}
        {% endwith %}
       
        <form method="POST" action="/upload" enctype="multipart/form-data">
            <label for="file">Select CSV File:</label>
            <input id="file" name="file" type="file" accept=".csv" required>
            <button type="submit">Upload & Proceed</button>
        </form>
    </div>
</body>
</html>
